name: Secrets + Repository Environment Example

on:
  push:
    paths:
      - .github/workflows/repository-environment-test.yml

# Workflow-level env using environment secret
env:
  GLOBAL_TOKEN: ${{ secrets.GLOBAL_TOKEN }}

jobs:
  demo:
    runs-on: ubuntu-latest

    # Attach repository environment
    # This environment must be created beforehand in you're github repository -> settings -> environments
    environment: testing

    # Job-level env using environment secrets
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}

    steps:
      - uses: actions/checkout@v4

      - name: Use workflow + job level environment secrets
        run: |
          echo "GLOBAL_TOKEN is available as: $GLOBAL_TOKEN (masked)"
          echo "GLOBAL_TOKEN length = ${#GLOBAL_TOKEN}"

          echo "DB_USER is available as: $DB_USER (masked)"
          echo "DB_USER length = ${#DB_USER}"

          echo "DB_PASS is available as: $DB_PASS (masked)"
          echo "DB_PASS length = ${#DB_PASS}"

      # Step-level env using environment secret
      - name: Step-level environment secret example
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "API_KEY is available only in this step as: $API_KEY (masked)"
          echo "API_KEY length = ${#API_KEY}"
