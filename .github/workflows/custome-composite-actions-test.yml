name: "Greet using custome composite actions"
on:
  push:
    paths:
      - .github/workflows/custome-composite-actions-test.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: "checkout code"
        uses: actions/checkout@v4
      - id: step1
        uses: ./.github/actions/composite_actions
        with:
          username: Samim

      - run: echo "Output is ${{ steps.step1.outputs.message }}"
