name: Secrets + Env Levels Example

on:
  push:
    paths:
      - .github/workflows/secrets-test.yml

# Workflow-level env using a secret (available to all jobs/steps)
env:
  GLOBAL_TOKEN: ${{ secrets.GLOBAL_TOKEN }}

jobs:
  demo:
    runs-on: ubuntu-latest

    # Job-level env using secrets (available only in this job)
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}

    steps:
      - uses: actions/checkout@v4

      - name: Use workflow + job level secrets
        run: |
          echo "GLOBAL_TOKEN is available as: $GLOBAL_TOKEN (masked)"
          echo "DB_USER is available as: $DB_USER (masked)"
          echo "DB_PASS is available as: $DB_PASS (masked)"

      # Step-level env using a secret (available only in this step)
      - name: Step-level secret example
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "API_KEY is available only in this step as: $API_KEY (masked)"
          echo "API_KEY length = ${#API_KEY}"
