name: All Env Examples

on:
  push:
    paths:
      - .github/workflows/environment-variable-test.yml

# Workflow-level variable (available everywhere)
env:
  APP_ENV: production

jobs:
  linux-job:
    runs-on: ubuntu-latest

    # Job-level variable (available only inside this job)
    env:
      NODE_ENV: test

    steps:
      - name: Print workflow + job level variables
        run: |
          echo "Workflow level APP_ENV = $APP_ENV"
          echo "Job level NODE_ENV = $NODE_ENV"

      # Step-level variable (only for this step)
      - name: Step-level variable example
        env:
          MESSAGE: Hello from step
        run: echo "Step message = $MESSAGE"

      # Default GitHub Variables (Linux)
      - name: Print default GitHub variables
        run: |
          echo "Repository = $GITHUB_REPOSITORY"
          echo "Branch Ref = $GITHUB_REF"
          echo "Commit SHA = $GITHUB_SHA"
          echo "Actor = $GITHUB_ACTOR"
          echo "Runner OS = $RUNNER_OS"

      # Dynamically set variable (Linux)
      - name: Set dynamic variable (Linux)
        run: echo "VERSION=1.0.0" >> $GITHUB_ENV

      - name: Use dynamic variable (Linux)
        run: echo "Dynamic VERSION = $VERSION"

  windows-job:
    runs-on: windows-latest

    steps:
      # Default GitHub Variables (Windows PowerShell)
      - name: Print default GitHub variables (Windows)
        run: |
          echo "Repository = $env:GITHUB_REPOSITORY"
          echo "Branch Ref = $env:GITHUB_REF"
          echo "Commit SHA = $env:GITHUB_SHA"
          echo "Actor = $env:GITHUB_ACTOR"
          echo "Runner OS = $env:RUNNER_OS"

      # Dynamically set variable (Windows PowerShell)
      - name: Set dynamic variable (Windows)
        run: echo "VERSION=2.0.0" >> $env:GITHUB_ENV

      - name: Use dynamic variable (Windows)
        run: echo "Dynamic VERSION = $env:VERSION"
