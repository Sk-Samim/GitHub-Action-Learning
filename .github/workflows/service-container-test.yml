name: This workflow is to test service containers 
on:
  push:
    paths:
      - .github/workflows/service-container-test.yml

jobs:
  Integrations:
    runs-on: ubuntu-latest
    container:
      image: node:20 # This workflow runs inside this container
    
    services:
      postgres:   # This is the service container hostname and this can be anything
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pass

    steps:
    - uses: actions/checkout@v4

    - name: Install pg client
      run: npm install pg

    - name: Test database connection
      run: |
        node -e "
        const { Client } = require('pg');
        const client = new Client({ connectionString: process.env.DATABASE_URL });
        client.connect()
          .then(() => {
            console.log('Connected to Postgres successfully');
            return client.end();
          })
          .catch(err => {
            console.error('Connection failed:', err);
            process.exit(1);
          });
        "
      env:
        DATABASE_URL: postgres://postgres:pass@postgres:5432/postgres
        
    